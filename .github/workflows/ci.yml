name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php-lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['7.4', '8.1', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: none
          coverage: none
      - name: php -l
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" >/dev/null; then
              echo "::error file=$file::PHP syntax error"
              fail=1
            fi
          done < <(find drwp-daily-reports -name '*.php' -print0)
          exit $fail

  python-tests:
    name: License server pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: license-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: license-server/requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx
      - name: pytest
        run: pytest -v
