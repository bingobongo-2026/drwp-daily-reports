name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同じブランチで新しいコミットが来たら、走行中の古い実行をキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    # ドラフトPRではCIを回さない（使わないなら下の条件は github.event... を消してOK）
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    outputs:
      php: ${{ steps.filter.outputs.php }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            php:
              - 'drwp-daily-reports/**'
            python:
              - 'license-server/**'

  php-lint:
    name: PHP syntax check
    needs: changes
    if: needs.changes.outputs.php == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['7.4', '8.4']   # 中間の 8.1 は省略（構文チェックは最古と最新で十分）
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: none
          coverage: none
      - name: php -l
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" >/dev/null; then
              echo "::error file=$file::PHP syntax error"
              fail=1
            fi
          done < <(find drwp-daily-reports -name '*.php' -print0)
          exit $fail

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php-version }})
    needs: changes
    if: needs.changes.outputs.php == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['7.4', '8.2']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    defaults:
      run:
        working-directory: drwp-daily-reports
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysqli, zip, libsodium
          tools: composer
          coverage: none
      - name: Install Subversion (for WP test lib)
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: Install WP test library + DB
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest
      - name: Composer install
        run: composer install --no-interaction --no-progress
      - name: Run PHPUnit
        run: vendor/bin/phpunit

  python-tests:
    name: License server pytest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: license-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: license-server/requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx
      - name: pytest
        run: pytest -v
