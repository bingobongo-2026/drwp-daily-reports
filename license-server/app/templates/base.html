<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>{% block title %}DRWP License Server{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7f9; color: #222; }
    header { background: #1f2937; color: #fff; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
    header a { color: #fff; text-decoration: none; margin-left: 16px; }
    main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
    h1 { margin: 0 0 16px; }
    h2 { margin: 0 0 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
    th { font-weight: 600; color: #374151; }
    input[type=text], input[type=datetime-local], select { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; }
    label { display: block; font-size: .9rem; color: #374151; margin: 12px 0 4px; }
    .btn { display: inline-block; border: 0; background: #111827; color: #fff; padding: 8px 14px; border-radius: 8px; text-decoration: none; cursor: pointer; font: inherit; }
    .btn.secondary { background: #475569; }
    .btn.danger { background: #b91c1c; }
    .btn.ghost { background: transparent; color: #374151; border: 1px solid #cbd5e1; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .muted { color: #64748b; font-size: .9rem; }
    .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; }
    .flash.ok { background: #dcfce7; color: #166534; }
    .flash.err { background: #fee2e2; color: #991b1b; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .8rem; background: #e5e7eb; }
    .pill.active { background: #dcfce7; color: #166534; }
    .pill.inactive { background: #fee2e2; color: #991b1b; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .92rem; }
    form.inline { display: inline; }
  </style>
</head>
<body>
  <header>
    <strong>DRWP License Server</strong>
    <nav>
      <a href="/admin/ui/licenses">ライセンス</a>
      <a href="/healthz">Health</a>
    </nav>
  </header>
  <main>
    {% if flash %}<div class="flash {{ flash_class or 'ok' }}">{{ flash }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
