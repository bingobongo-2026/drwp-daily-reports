<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>{{ title or "DRWP License Server" }}</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; margin: 0; background:#f6f7f9; color:#222; }
    header { background:#1f2937; color:#fff; padding:14px 24px; display:flex; justify-content:space-between; align-items:center; }
    header a { color:#fff; text-decoration:none; margin-left:16px; }
    main { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .card { background:#fff; border-radius:12px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:16px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #e5e7eb; vertical-align:top; }
    input, select, textarea, button { font: inherit; }
    input[type=text], input[type=datetime-local], textarea, select { width:100%; box-sizing:border-box; padding:8px 10px; border:1px solid #cbd5e1; border-radius:8px; background:#fff; }
    textarea { min-height:96px; }
    button, .btn { display:inline-block; border:0; background:#111827; color:#fff; padding:8px 12px; border-radius:8px; text-decoration:none; cursor:pointer; }
    .btn.secondary { background:#475569; }
    .btn.warn { background:#b45309; }
    .btn.danger { background:#b91c1c; }
    .grid2 { display:grid; grid-template-columns: 1.4fr 1fr; gap:16px; }
    .muted { color:#64748b; font-size:.92rem; }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; background:#e5e7eb; font-size:.85rem; }
    .pill.active { background:#dcfce7; }
    .pill.inactive { background:#fee2e2; }
    .pill.standard { background:#e0f2fe; }
    .pill.pro { background:#f3e8ff; }
    .mono { font-family: ui-monospace,SFMono-Regular,Menlo,monospace; }
  </style>
</head>
<body>
  <header>
    <div><strong>DRWP License Server</strong></div>
    <nav>
      <a href="/admin/licenses">契約一覧</a>
      <a href="/healthz">Health</a>
      <a href="/admin/logout">ログアウト</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
