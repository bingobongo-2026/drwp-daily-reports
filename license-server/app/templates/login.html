<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><title>ログイン</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f7f9}
.wrap{max-width:420px;margin:80px auto;background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
input,button{font:inherit} input{width:100%;box-sizing:border-box;padding:10px;border:1px solid #cbd5e1;border-radius:8px}
button{margin-top:12px;width:100%;padding:10px;border:0;background:#111827;color:#fff;border-radius:8px}
.err{color:#b91c1c;margin:8px 0}
</style></head><body><div class="wrap">
<h1>管理ログイン</h1>
<p>環境変数 <code>DRWP_ADMIN_TOKEN</code> を入力してください。</p>
{% if error %}<div class="err">{{ error }}</div>{% endif %}
<form method="post" action="/admin/login">
  <input type="password" name="token" placeholder="Admin token" required>
  <button type="submit">ログイン</button>
</form>
</div></body></html>
